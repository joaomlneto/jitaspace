sonar.projectKey=joaomlneto_jitaspace
sonar.organization=joaomlneto

sonar.sources=apps/web/app,apps/web/components,packages
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/generated/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/jest.config.ts,**/jest.setup.ts,**/env.ts,**/kubb.config.ts

sonar.tests=apps/web,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# IO-bound / platform-glue code that isn't unit-tested by design: the EVE
# scrapers + Bull/Redis/Discord/Prisma singletons, the Inngest/Trigger.dev
# adapters (which need a platform runtime to exercise), and the sde-utils
# network/IO + barrel files. The pure logic stays measured — including
# sde-utils' zip.ts/sources/sde.ts and background-jobs' utils/updateTable.ts.
sonar.coverage.exclusions=\
  packages/sde-utils/src/download.ts,\
  packages/sde-utils/src/sde.ts,\
  packages/sde-utils/src/constants.ts,\
  packages/sde-utils/src/index.ts,\
  packages/background-jobs/jobs/**,\
  packages/background-jobs/helpers/**,\
  packages/background-jobs/db.ts,\
  packages/background-jobs/kv.ts,\
  packages/background-jobs/chat.ts,\
  packages/background-jobs/env.ts,\
  packages/background-jobs/config.ts,\
  packages/background-jobs/utils/downloadFile.ts,\
  packages/background-jobs-triggerdev/**,\
  packages/eve-scrape/adapter.ts,\
  packages/eve-scrape/client.ts,\
  packages/eve-scrape/env.ts,\
  apps/web/components/Status/TriggerJobsDashboard.tsx,\
  apps/web/app/status/actions.ts,\
  apps/web/app/api/inngest/route.ts

# The per-entity scrapers and the platform adapters / mirrored dashboards are
# intentionally repetitive, so exclude them from duplication analysis.
sonar.cpd.exclusions=\
  packages/background-jobs/jobs/**,\
  packages/background-jobs-triggerdev/**,\
  packages/eve-scrape/adapter.ts,\
  apps/web/components/Status/TriggerJobsDashboard.tsx,\
  apps/web/lib/triggerStatus.ts

sonar.javascript.lcov.reportPaths=\
  apps/web/coverage/lcov.info,\
  packages/auth/coverage/lcov.info,\
  packages/auth-utils/coverage/lcov.info,\
  packages/background-jobs/coverage/lcov.info,\
  packages/chat/coverage/lcov.info,\
  packages/esi-client/coverage/lcov.info,\
  packages/esi-metadata/coverage/lcov.info,\
  packages/eve-data/coverage/lcov.info,\
  packages/eve-scrape/coverage/lcov.info,\
  packages/hooks/coverage/lcov.info,\
  packages/datatable-tanstack/coverage/lcov.info,\
  packages/datatable-mantine/coverage/lcov.info,\
  packages/sde-utils/coverage/lcov.info,\
  packages/tiptap-eve/coverage/lcov.info,\
  packages/ui/coverage/lcov.info,\
  packages/utils/coverage/lcov.info

# AXIOS_BASE / AXIOS_HEADERS are optional build-time-injected globals. The
# `typeof X === "undefined"` guards in the esi-client are load-bearing: a direct
# `X === undefined` comparison throws a ReferenceError when the global is not
# injected. typescript:S7741 (prefer direct undefined comparison) is therefore a
# false positive on this file.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S7741
sonar.issue.ignore.multicriteria.e1.resourceKey=packages/esi-client/src/client.ts
