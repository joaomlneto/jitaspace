packages:
  - apps/*
  - packages/*
  - tooling/*

overrides:
  # Keep a single @tanstack/query-core so react-query's QueryClient and
  # @tanstack/db collections share one type identity (avoids ERR "#private
  # refers to a different member" in @jitaspace/hooks).
  "@tanstack/query-core": 5.100.14
  "@types/react": 19.2.15
  "@types/react-dom": 19.2.3
  "prosemirror-model": "1.25.7"
  "prosemirror-state": "1.4.4"
  "prosemirror-transform": "1.12.0"
  "prosemirror-view": "1.41.8"
nodeLinker: hoisted
publicHoistPattern:
  - '*prisma*'
strictPeerDependencies: false
enablePrePostScripts: true
allowBuilds:
  '@depot/cli': false
  '@kubb/cli': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@sveltejs/kit': true
  '@swc/core': true
  '@vercel/speed-insights': true
  aws-sdk: true
  core-js-pure: true
  cypress: true
  es5-ext: true
  esbuild: true
  inngest-cli: true
  lzma-native: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  turbo: true
  unrs-resolver: true
