name: Cypress Tests

on:
  push:
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    # Runs tests in parallel with matrix strategy https://docs.cypress.io/guides/guides/parallelization
    # https://docs.github.com/en/actions/using-jobs/using-a-matrix-for-your-jobs
    # Also see warning here https://github.com/cypress-io/github-action#parallel
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }} # Turborepo caching
      TURBO_TEAM: ${{ vars.TURBO_TEAM }} # Turborepo caching
      # Skip runtime env validation in Next.js during CI runs where secrets are not available
      SKIP_ENV_VALIDATION: "1"
    strategy:
      fail-fast: false # https://github.com/cypress-io/github-action/issues/48
      matrix:
        containers: [1, 2] # Uses 2 parallel instances
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v2
        with:
          version: 10.30.2
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Cypress run
        # Uses the official Cypress GitHub action https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v6
        with:
          # Dependencies are already installed at monorepo root; skip action-level install
          # to avoid lockfile lookup in apps/web (pnpm lockfile is at repository root).
          install: false
          # Run commands from the web app workspace so `pnpm start` resolves to `apps/web`
          working-directory: apps/web
          # Starts web server for E2E tests - the web package exposes `start` which runs Next.js
          start: pnpm start
          wait-on: "http://localhost:3000" # Waits for above
          # Records to Cypress Cloud
          # https://docs.cypress.io/guides/cloud/projects#Set-up-a-project-to-record
          record: true
          parallel: true # Runs test in parallel using settings above
        env:
          # If you enable recording/parallelization set CYPRESS_RECORD_KEY in repo secrets
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
