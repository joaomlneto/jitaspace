name: Cypress Tests

on:
  push:
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    # Runs tests in parallel with matrix strategy https://docs.cypress.io/guides/guides/parallelization
    # https://docs.github.com/en/actions/using-jobs/using-a-matrix-for-your-jobs
    # Also see warning here https://github.com/cypress-io/github-action#parallel
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }} # Turborepo caching
      TURBO_TEAM: ${{ vars.TURBO_TEAM }} # Turborepo caching
      # Skip runtime env validation in Next.js during CI runs where secrets are not available
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://root@localhost:26257/jitaspace?sslmode=disable"
      REDIS_URL: "redis://localhost:6379"
    strategy:
      fail-fast: false # https://github.com/cypress-io/github-action/issues/48
      matrix:
        containers: [1, 2] # Uses 2 parallel instances
    steps:
      - name: Start CockroachDB
        run: |
          docker run -d \
            --name cockroachdb \
            -p 26257:26257 \
            -p 8080:8080 \
            cockroachdb/cockroach:v24.3.7 \
            start-single-node --insecure --store=type=mem,size=0.5
          until curl -sf http://localhost:8080/health?ready=1; do sleep 1; done
          docker exec cockroachdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS jitaspace;"
      - name: Checkout
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v2
        with:
          version: 10.30.2
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Push database schema
        run: cd packages/db && pnpm exec prisma db push
      - name: Build
        run: pnpm build
      - name: Cypress run
        # Uses the official Cypress GitHub action https://github.com/cypress-io/github-action
        uses: cypress-io/github-action@v6
        with:
          # Dependencies are already installed at monorepo root. Use install-command
          # (rather than install: false) so the action still caches the Cypress binary,
          # but only downloads it — not a full pnpm install from apps/web which would
          # fail because the pnpm lockfile lives at the repository root.
          install-command: pnpm exec cypress install
          # Run commands from the web app workspace so `pnpm start` resolves to `apps/web`
          working-directory: apps/web
          # Starts web server for E2E tests - the web package exposes `start` which runs Next.js
          start: pnpm start
          wait-on: "http://localhost:3000" # Waits for above
          # Records to Cypress Cloud
          # https://docs.cypress.io/guides/cloud/projects#Set-up-a-project-to-record
          record: true
          parallel: true # Runs test in parallel using settings above
        env:
          # If you enable recording/parallelization set CYPRESS_RECORD_KEY in repo secrets
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
